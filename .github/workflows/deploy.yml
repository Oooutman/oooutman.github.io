name: Deploy # 工作流名称

on:
  push:
    branches:
      - HexoBlog # 当向HexoBlog分支推送更改时触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 运行环境
    steps:
    - name: Checkout 🛎️ # 步骤名称
      uses: actions/checkout@v2 # 使用的动作
      with:
        ref: HexoBlog # 检出HexoBlog分支

    - name: Setup Node 🍴 # 步骤名称
      uses: actions/setup-node@v2 # 使用的动作
      with:
        node-version: 18.15.0 # 设置Node.js版本

    - name: Cache dependencies 🍽️ # 步骤名称
      uses: actions/cache@v2 # 使用的动作
      with:
        path: ~/.npm # 缓存路径
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }} # 缓存键
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install Dependencies 🍷 # 步骤名称
      run: npm ci # 运行命令

    - name: Build 💩 # 步骤名称
      run: npx hexo generate # 运行命令

    - name: Deploy 🚀 # 步骤名称
      uses: peaceiris/actions-gh-pages@v3 # 使用的动作
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub令牌
        publish_dir: ./public # 发布目录
        publish_branch: main # 发布分支